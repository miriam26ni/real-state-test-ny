    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function renderQuiz() {
      const shuffled = shuffle([...questions]);
      const quizDiv = document.getElementById('quiz');
      let html = '';

      shuffled.forEach((q, index) => {
        html += `
          <div class="question" id="q${q.num}">
            <div class="question-number">Pregunta ${index + 1} <small>(#${q.num})</small></div>
            <p><strong>${q.q}</strong></p>
            <div class="options">
              <div class="option" data-q="${q.num}" data-answer="a" onclick="selectAnswer(this)">a) ${q.a}</div>
              <div class="option" data-q="${q.num}" data-answer="b" onclick="selectAnswer(this)">b) ${q.b}</div>
              <div class="option" data-q="${q.num}" data-answer="c" onclick="selectAnswer(this)">c) ${q.c}</div>
              <div class="option" data-q="${q.num}" data-answer="d" onclick="selectAnswer(this)">d) ${q.d}</div>
            </div>
          </div>`;
      });

      quizDiv.innerHTML = html;
    }

    function selectAnswer(element) {
      const qNum = parseInt(element.dataset.q);
      const selected = element.dataset.answer;
      const correct = correctAnswers[qNum];

      const options = element.parentElement.children;
      Array.from(options).forEach(opt => opt.style.pointerEvents = 'none');

      if (selected === correct) {
        element.classList.add('correct');
      } else {
        element.classList.add('wrong');
        Array.from(options).forEach(opt => {
          if (opt.dataset.answer === correct) opt.classList.add('correct');
        });
      }
    }

    function calcularResultado() {
      let correctCount = 0;
      document.querySelectorAll('.question').forEach(q => {
        const correctOpt = q.querySelector('.option.correct');
        if (correctOpt && !correctOpt.classList.contains('wrong')) correctCount++;
      });

      const percentage = Math.round((correctCount / 175) * 100);
      let mensaje = percentage >= 80 ? "¡Excelente! Estás muy bien preparado." :
                    percentage >= 70 ? "¡Buen resultado! Repasa las áreas débiles." : 
                    "Sigue estudiando. ¡Tú puedes!";

      alert(`🎯 RESULTADO FINAL\n\nCorrectas: ${correctCount} de 175\nPorcentaje: ${percentage}%\n\n${mensaje}`);
    }

    window.onload = renderQuiz;
  </script>
